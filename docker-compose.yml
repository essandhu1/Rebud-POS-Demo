services:
  postgres:
    image: postgres:16-alpine
    container_name: rebud-pos-demo-postgres
    environment:
      POSTGRES_DB: rebud_pos_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rebud_pos_demo_pgdata:/var/lib/postgresql/data

volumes:
  rebud_pos_demo_pgdata:
